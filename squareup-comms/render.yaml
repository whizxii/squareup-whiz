services:
  - type: web
    name: squareup-whiz
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DEBUG
        value: "false"
      - key: ENABLE_DEV_AUTH
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: LLM_MODEL
        value: "llama-3.3-70b-versatile"
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:3001,https://squareup-comms.vercel.app,https://squareup-comms-whizdome.vercel.app,https://squareup-comms-git-main-whizdome.vercel.app,https://squareup-comms-whizxii-whizdome.vercel.app"
      - key: ALLOWED_ORIGIN_REGEX
        value: "https://squareup-comms.*\\.vercel\\.app"
      - key: ENCRYPTION_KEY
        sync: false
      - key: LOG_LEVEL
        value: "INFO"
      - key: PYTHON_VERSION
        value: "3.11.6"
